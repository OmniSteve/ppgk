<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="description" content="Premier Performance GK — Elite goalkeeper training in Malta" />
    <title>Premier Performance GK</title>
    <!-- Apply saved theme before first paint to prevent flash -->

      try {
        document.documentElement.dataset.theme =
          localStorage.getItem('ppgk-theme') || 'classic';
      } catch (_) {}
    </script>
    <!-- Google Fonts: loaded for Floodlit theme (Classic uses system fonts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;700;800&family=Instrument+Sans:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">

  </body>
</html>
