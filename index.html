<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Served from R2 via the Worker (worker/src/routes/assets.js) using a
         relative URL — resolves against whichever domain served the page, so
         dev.ppgk.app and ppgk.app each get their own environment's R2 bucket
         automatically, matching the app's existing relative /api/* convention
         (see src/services/apiClient.js). Bump ?v= to bust the browser cache
         when the image itself is replaced. -->
    <link rel="icon" type="image/png" href="/api/assets/favicon.png?v=1" />
    <link rel="shortcut icon" type="image/png" href="/api/assets/favicon.png?v=1" />
    <link rel="apple-touch-icon" href="/api/assets/favicon.png?v=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="description" content="Premier Performance GK — Elite goalkeeper training in Malta" />
    <title>Premier Performance GK</title>
    <!-- Apply saved theme before first paint to prevent flash -->
    <script>
      try {
        document.documentElement.dataset.theme =
          localStorage.getItem('ppgk-theme') || 'midnight';
      } catch (_) {}
    </script>
    <!-- Google Fonts: shared across all themes (Big Shoulders Display + Instrument Sans) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
