# Premier Performance GK — Cloudflare Worker configuration
# Deploy:   npx wrangler deploy
# Local dev: npx wrangler dev --local

name              = "ppgk"
main              = "worker/src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
# Credit expiry + expiry reminders: daily at 03:00 UTC
# Session reminders: daily at 07:00 UTC
crons = ["0 3 * * *", "0 7 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "ppgk-production"
database_id = "8a8d6008-cc41-48fb-b635-0b7d6a86ce82"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "ppgk"

[observability.logs]
enabled = true
invocation_logs = true

[vars]
APP_ENV = "production"
APP_URL = "https://ppgk.app"

# ── Custom domain routing ─────────────────────────────────────────────────────
[[routes]]
pattern = "ppgk.app/api/*"
zone_name = "ppgk.app"

# ── Secrets — NEVER commit values here ───────────────────────────────────────
# Set via: npx wrangler secret put <SECRET_NAME>
#
# Required secrets:
#   JWT_SECRET              — random 32+ char string (openssl rand -hex 32)
#   STRIPE_SECRET           — sk_live_... or sk_test_...
#   STRIPE_WEBHOOK_SECRET   — whsec_... (from Stripe dashboard webhook config)
#   RESEND_API_KEY          — re_...
#   APP_URL                 — https://ppgk.app  (already set in [vars] above)

[dev]
port           = 8787
local_protocol = "http"

# ══════════════════════════════════════════════════════════════════════════════
# DEV ENVIRONMENT — dev.ppgk.app
#
# Deploys a SEPARATE worker named "ppgk-dev" — production (top-level config
# above) is untouched. Wrangler does not inherit bindings into named
# environments, so everything dev needs is declared explicitly here.
#
# Deploy:  npx wrangler deploy --env dev
# Secrets: npx wrangler secret put <NAME> --env dev   (use Stripe TEST keys!)
# ══════════════════════════════════════════════════════════════════════════════
[env.dev]
name = "ppgk-dev"

[env.dev.triggers]
crons = ["0 3 * * *", "0 7 * * *"]

[[env.dev.d1_databases]]
binding       = "DB"
database_name = "ppgk-dev"
# REPLACE ME: Cloudflare dashboard → Storage & Databases → D1 → ppgk-dev →
# "Database ID"  (or run: npx wrangler d1 list)
database_id   = "445f96a4-ed9c-4159-8bc7-2804a6c3cb9e"
migrations_dir = "migrations"

[[env.dev.r2_buckets]]
binding     = "STORAGE"
# Create first: npx wrangler r2 bucket create ppgk-dev
bucket_name = "ppgk-dev"

[env.dev.observability.logs]
enabled = true
invocation_logs = true

[env.dev.vars]
APP_ENV = "development"
APP_URL = "https://dev.ppgk.app"

[[env.dev.routes]]
pattern   = "dev.ppgk.app/api/*"
zone_name = "ppgk.app"

# Dev secrets — set separately from production (NEVER reuse live keys):
#   npx wrangler secret put JWT_SECRET            --env dev   # fresh random value
#   npx wrangler secret put STRIPE_SECRET         --env dev   # sk_test_... ONLY
#   npx wrangler secret put STRIPE_WEBHOOK_SECRET --env dev   # whsec_... from a
#     separate Stripe sandbox webhook endpoint → https://dev.ppgk.app/api/webhooks/stripe
#   npx wrangler secret put RESEND_API_KEY        --env dev
