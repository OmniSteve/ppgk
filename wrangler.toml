# Premier Performance GK — Cloudflare Worker configuration
# Deploy:   npx wrangler deploy
# Local dev: npx wrangler dev --local

name              = "ppgk-api"
main              = "worker/src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
# Credit expiry + expiry reminders: daily at 03:00 UTC
# Session reminders: daily at 07:00 UTC
crons = ["0 3 * * *", "0 7 * * *"]

[[d1_databases]]
binding       = "DB"
database_name = "ppgk"
database_id   = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[vars]
APP_ENV = "development"
# APP_URL must be set as a secret or var per environment:
# npx wrangler secret put APP_URL

# ── Secrets — NEVER commit values here ───────────────────────────────────────
# Set via: npx wrangler secret put <SECRET_NAME>
#
# Required secrets:
#   JWT_SECRET              — random 32+ char string (openssl rand -hex 32)
#   STRIPE_SECRET           — sk_live_... or sk_test_...
#   STRIPE_WEBHOOK_SECRET   — whsec_... (from Stripe dashboard webhook config)
#   RESEND_API_KEY          — re_...
#   APP_URL                 — https://premierperformancegk.com

[dev]
port           = 8787
local_protocol = "http"